<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Love</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0A1628;--navy2:#0D1E3A;--blue:#1B3A6B;--blue2:#24509A;
  --sky:#4A7FD4;--ice:#B8D0EE;--white:#F0F5FF;
  --gold:#C8A84B;--gold2:#E6C96A;--muted:#6A8CB0;
  --paper:#F7F3EC;--ink:#1A2340;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy);font-family:'DM Sans',sans-serif;color:var(--white);}

/* ═══ PAGE SYSTEM ═══ */
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.6s ease;overflow:hidden;}
.page.active{opacity:1;pointer-events:auto;}
.star-field{position:absolute;inset:0;pointer-events:none;}

/* ═══ P1 ENVELOPE ═══ */
.env-scene{position:relative;width:min(460px,86vw);display:flex;flex-direction:column;align-items:center;margin-top: 100px;}
.env-clip{position:relative;width:100%;overflow:visible;} /* Overflow visible agar kartu bisa keluar */

.env-outer{position:relative;width:100%;filter:drop-shadow(0 16px 50px rgba(0,0,0,0.7));z-index:3;}
.env-body-wrap{position:relative;width:100%;aspect-ratio:1.62/1;}

/* Lapisan 1: Bagian Belakang Amplop */
.env-back{position:absolute;inset:0;background:#152E60;border-radius:3px;z-index:1;}

/* Lapisan 2: KARTU (Terjepit) */
.letter-card-wrap{
  position:absolute;
  bottom:5px;
  left:50%;
  transform:translateX(-50%) translateY(0);
  width:92%;
  z-index:2;
  transition:transform 1.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Lapisan 3: Lipatan Depan (Menutupi Kartu) */
.env-front-folds{position:absolute;inset:0;z-index:3;pointer-events:none;}
.env-fold-l{position:absolute;top:0;left:0;bottom:0;width:50%;background:linear-gradient(to right,#122553,#1A3872);clip-path:polygon(0 0,0 100%,100% 50%);}
.env-fold-r{position:absolute;top:0;right:0;bottom:0;width:50%;background:linear-gradient(to left,#122553,#1A3872);clip-path:polygon(100% 0,100% 100%,0 50%);}
.env-fold-bc{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-style:solid;border-width:0 50% 40% 50%;border-color:transparent transparent #162E62 transparent;}

/* Lapisan 4: Penutup (Flap) */
.env-flap{position:absolute;top:0;left:0;right:0;height:56%;z-index:4;transform-origin:top center;transition:transform 0.9s ease-in;}
.env-flap-front{position:absolute;inset:0;background:linear-gradient(160deg,#1F4490 0%,#163270 60%,#112458 100%);clip-path:polygon(0 0,100% 0,50% 96%);}
.env-flap.opened{transform:rotateX(-180deg);z-index:1;} /* Z-index turun saat buka agar tidak menutupi kartu yang naik */

/* Card Styling */
.letter-card{background:#1E2A42;border-radius:2px;padding:2rem 1.8rem;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.3);}
.lc-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--white);}
.lc-name{font-family:'Pinyon Script',cursive;font-size:1.5rem;color:var(--ice);}
.lc-wish{font-style:italic;font-size:0.9rem;color:var(--ice);margin:1rem 0;line-height:1.5;}
.lc-btn{background:var(--blue2);color:#fff;border:none;padding:0.6rem 1.2rem;cursor:pointer;opacity:0;transition:opacity 0.5s;}
.lc-btn.show{opacity:1;}

/* Shared Styles */
.pg-inner{max-width:560px;width:90%;text-align:center;z-index:2;}
.pg-title{font-family:'Cormorant Garamond',serif;font-size:3.5rem;line-height:1;}
.nav-btn{background:transparent;border:1px solid var(--sky);padding:0.7rem 1.5rem;color:var(--ice);cursor:pointer;margin-top:20px;}
.wax-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-42%);z-index:10;cursor:pointer;transition:0.3s;}
.wax-wrap.gone{opacity:0;transform:translate(-50%,-42%) scale(0);pointer-events:none;}
.env-hint{margin-top:20px;font-size:0.8rem;color:var(--muted);animation:float 3s infinite;}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}
</style>
</head>
<body>

<div class="page active" id="p-envelope">
  <div class="star-field" id="sf1"></div>
  <div class="env-scene">
    <div class="env-clip">
      
      <div class="env-outer" id="envOuter">
        <div class="env-body-wrap">
          
          <div class="env-back"></div>

          <div class="letter-card-wrap" id="letterCard">
            <div class="letter-card">
              <p style="font-size:0.6rem; letter-spacing:2px; color:var(--muted)">PRIVATE LETTER</p>
              <h2 class="lc-title">Happy Birthday</h2>
              <p class="lc-name">my love</p>
              <p class="lc-wish">May this year carry you gently — full of peace, warmth, and everything you deserve.</p>
              <button class="lc-btn" id="lcBtn" onclick="goTo('p-hero')">Read Full Note</button>
            </div>
          </div>

          <div class="env-front-folds">
            <div class="env-fold-l"></div>
            <div class="env-fold-r"></div>
            <div class="env-fold-bc"></div>
          </div>

          <div class="env-flap" id="envFlap">
            <div class="env-flap-front"></div>
          </div>
        </div>

        <div class="wax-wrap" id="waxSeal" onclick="openEnvelope()">
          <svg width="70" height="70" viewBox="0 0 82 82">
            <circle cx="41" cy="41" r="33" fill="#BE3535"/>
            <path d="M41 54C41 54 24 43 24 32C24 25.5 30 21 36.5 23.5C39 24.5 40.5 27.5 41 29.5C41.5 27.5 43 24.5 45.5 23.5C52 21 58 25.5 58 32C58 43 41 54 41 54Z" fill="#D45050"/>
          </svg>
        </div>
      </div>
    </div>
    <p class="env-hint" id="envHint">Tap to open</p>
  </div>
</div>

<div class="page" id="p-hero">
  <div class="star-field" id="sf2"></div>
  <div class="pg-inner">
    <p class="pg-title">Happy<br><i style="color:var(--gold2)">Birthday</i></p>
    <p style="font-family:'Pinyon Script'; font-size:2rem; color:var(--ice)">my love</p>
    <button class="nav-btn" onclick="goTo('p-letter')">Next</button>
  </div>
</div>

<div class="page" id="p-letter">
  <div class="pg-inner">
    <h2 class="pg-title">From my heart</h2>
    <p style="font-style:italic; margin:20px 0; color:var(--ice)">
      On this special day, I want you to know how much brighter my world is with you in it.
    </p>
    <button class="nav-btn" onclick="location.reload()">Replay</button>
  </div>
</div>

<script>
/* Stars */
function makeStars(id){
  const c=document.getElementById(id);
  for(let i=0;i<40;i++){
    const s=document.createElement('div');
    s.style.cssText=`position:absolute;background:#fff;width:2px;height:2px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation:twinkle ${2+Math.random()*3}s infinite;opacity:${Math.random()}`;
    c.appendChild(s);
  }
}
makeStars('sf1'); makeStars('sf2');

/* Navigation */
function goTo(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* Open Envelope Logic */
let envDone = false;
function openEnvelope(){
  if(envDone) return;
  envDone = true;

  // 1. Buka Flap & Hilangkan Seal
  document.getElementById('envFlap').classList.add('opened');
  document.getElementById('waxSeal').classList.add('gone');
  document.getElementById('envHint').style.opacity = '0';

  const card = document.getElementById('letterCard');

  // 2. Kartu Meluncur Keluar (Naik)
  setTimeout(() => {
    // -320px akan menarik kartu keluar dari sela-sela lipatan ke atas
    card.style.transform = 'translateX(-50%) translateY(-320px)';
  }, 800);

  // 3. Munculkan Tombol di Dalam Kartu
  setTimeout(() => {
    document.getElementById('lcBtn').classList.add('show');
  }, 2000);
}
</script>
</body>
</html>
